<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bear Creek Fire — EdgeWorks + reView demo</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root {
    --bg: #0b1015;
    --bg-2: #121922;
    --bg-3: #1a232f;
    --line: #233042;
    --ink: #e6edf6;
    --ink-2: #9aa8bd;
    --ink-3: #6c7a92;
    --fire: #ff5a2c;
    --fire-2: #ffb55a;
    --fire-3: #7a1f0a;
    --ok: #59d39e;
    --warn: #f1c447;
    --bad: #ff5a6e;
    --cube: #4ad0ff;
    --cube-dim: #1e4a63;
    --wind: #33e660;
    --phosphor: #33e660;
    --shadow: 0 8px 24px rgba(0,0,0,.4);
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); height: 100%; overflow: hidden; }
  body { display: grid; grid-template-rows: 56px 1fr 110px; height: 100vh; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; border-bottom: 1px solid var(--line); background: var(--bg-2);
  }
  .title { display: flex; align-items: baseline; gap: 14px; }
  .title h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: .2px; }
  .title .sub { color: var(--ink-3); font-size: 12px; font-family: var(--mono); }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
           background: var(--bg-3); border: 1px solid var(--line); font-size: 11px; color: var(--ink-2); font-family: var(--mono); }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--fire); box-shadow: 0 0 12px var(--fire); }

  .nav { display: flex; gap: 8px; }
  button.btn {
    background: var(--bg-3); color: var(--ink); border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--mono);
  }
  button.btn:hover { border-color: var(--cube); color: var(--cube); }
  button.btn.primary { background: var(--fire); color: #0b1015; border-color: var(--fire); }
  button.btn.primary:hover { background: var(--fire-2); border-color: var(--fire-2); color: #0b1015; }

  /* Toggle switch */
  .toggle { display: inline-flex; align-items: center; gap: 8px; user-select: none; cursor: pointer;
            font-size: 11px; color: var(--ink-2); font-family: var(--mono); }
  .toggle input { display: none; }
  .toggle .track {
    width: 32px; height: 18px; background: var(--bg-3); border: 1px solid var(--line);
    border-radius: 999px; position: relative; transition: background .2s, border-color .2s;
  }
  .toggle .track::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink-3); transition: left .2s, background .2s;
  }
  .toggle input:checked + .track { background: rgba(74,208,255,.15); border-color: var(--cube); }
  .toggle input:checked + .track::after { left: 16px; background: var(--cube); }

  /* MAIN GRID */
  main { display: grid; grid-template-columns: 320px 1fr 340px; min-height: 0; }
  #mapWrap { position: relative; background:
              radial-gradient(1200px 800px at 30% 30%, #18222e 0%, #0c1218 60%, #07090d 100%); overflow: hidden;
              transition: background .3s; }
  #mapWrap.no-bg { background: var(--bg); }
  #mapWrap.no-bg .ridge, #mapWrap.no-bg .river { opacity: 0; }
  .ridge, .river { transition: opacity .3s; }

  #basemap {
    position: absolute; inset: 0; z-index: 1;
    transition: opacity .3s, filter .3s;
  }
  #basemap .leaflet-control-attribution {
    background: rgba(11,16,21,.7); color: var(--ink-3); font-size: 10px;
    border: 1px solid var(--line); border-radius: 4px; padding: 2px 6px;
  }
  #basemap .leaflet-control-attribution a { color: var(--cube); }
  /* Tint satellite tiles slightly to fit dark UI */
  #basemap .leaflet-tile { filter: saturate(.85) brightness(.78) contrast(1.05); }
  #mapWrap.no-bg #basemap { opacity: 0; pointer-events: none; }
  svg.map { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  svg.map .cube-g, svg.map .asset-g, svg.map .a-shape, svg.map .asset-line, svg.map .a-label, svg.map .support-g { pointer-events: auto; }
  .legend, .pop-card, .inspector { z-index: 10; }

  /* Basemap style selector */
  .map-style-pick {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    display: flex; gap: 4px; padding: 4px;
    background: rgba(11,16,21,.85); border: 1px solid var(--line); border-radius: 8px;
    backdrop-filter: blur(8px);
  }
  .map-style-pick button {
    background: transparent; border: 1px solid transparent; color: var(--ink-2);
    padding: 4px 9px; border-radius: 5px; font-size: 10px; font-family: var(--mono);
    cursor: pointer; text-transform: uppercase; letter-spacing: .5px;
  }
  .map-style-pick button:hover { color: var(--ink); border-color: var(--line); }
  .map-style-pick button.active { background: var(--cube); color: #0b1015; border-color: var(--cube); }
  svg.map { width: 100%; height: 100%; display: block; }
  .legend {
    position: absolute; left: 16px; bottom: 16px; padding: 10px 12px;
    background: rgba(11,16,21,.75); border: 1px solid var(--line); border-radius: 8px; font-size: 11px;
    backdrop-filter: blur(6px); color: var(--ink-2); font-family: var(--mono); line-height: 1.65;
  }
  .legend .row { display: flex; align-items: center; gap: 8px; }
  .legend .li { flex-shrink: 0; display: block; }
  .legend hr { border: none; border-top: 1px solid var(--line); margin: 5px 0; }

  /* RIGHT PANEL */
  aside {
    background: var(--bg-2); border-left: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0;
  }
  .panel-head {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-head h2 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--ink-2); }
  .panel-head .clock { font-family: var(--mono); font-size: 12px; color: var(--fire-2); }

  .event-card {
    padding: 16px 20px; border-bottom: 1px solid var(--line);
    border-left: 3px solid transparent;
    transition: background .3s;
  }
  .event-card .when { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .3px; }
  .event-card .what { font-size: 17px; margin: 8px 0 9px; font-weight: 700; line-height: 1.3; color: var(--ink); }
  .event-card .why  { font-size: 13px; color: var(--ink-2); line-height: 1.65; }
  .event-card.high  { border-left-color: var(--fire); background: rgba(255,90,44,.04); }
  /* Latest event always gets a subtle glow */
  .event-card:first-child { border-left-color: var(--cube); background: rgba(74,208,255,.04); }
  .event-card.high:first-child { border-left-color: var(--fire); background: rgba(255,90,44,.07); }

  /* Event type badge */
  .ev-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-family: var(--mono); font-weight: 700; letter-spacing: .6px;
    margin-bottom: 4px;
  }
  .ev-fire   { background: rgba(255,90,44,.18);  color: #ff8060; border: 1px solid rgba(255,90,44,.35); }
  .ev-wind   { background: rgba(255,90,44,.22);  color: #ffb55a; border: 1px solid rgba(255,181,90,.5); }
  .ev-smoke  { background: rgba(255,181,90,.15); color: #ffb55a; border: 1px solid rgba(255,181,90,.3); }
  .ev-spread { background: rgba(255,181,90,.12); color: #ffd080; border: 1px solid rgba(255,181,90,.28); }
  .ev-rec    { background: rgba(74,208,255,.1);  color: var(--cube); border: 1px solid rgba(74,208,255,.25); }
  .ev-exec   { background: rgba(74,208,255,.08); color: var(--cube); border: 1px solid rgba(74,208,255,.2); }
  .ev-ok     { background: rgba(89,211,158,.1);  color: #59d39e; border: 1px solid rgba(89,211,158,.25); }
  .ev-audit  { background: rgba(89,211,158,.08); color: #59d39e; border: 1px solid rgba(89,211,158,.2); }
  .ev-info   { background: var(--bg-3); color: var(--ink-3); border: 1px solid var(--line); }

  /* Support asset panel */
  .support-list { padding: 0 12px 8px; display: flex; flex-direction: column; gap: 4px; }
  .sup-card {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 8px; border-radius: 6px; background: var(--bg-3);
    border: 1px solid var(--line); transition: all .35s;
  }
  .sup-card.active { border-color: #59d39e; background: rgba(89,211,158,.06); }
  .sup-card.redeploying { border-color: var(--warn); background: rgba(241,196,71,.06); }
  .sup-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    background: var(--ink-3); transition: background .35s;
  }
  .sup-card.active .sup-dot { background: #59d39e; box-shadow: 0 0 6px rgba(89,211,158,.5); }
  .sup-card.redeploying .sup-dot { background: var(--warn); box-shadow: 0 0 5px rgba(241,196,71,.4); }
  .sup-name { font-size: 11px; font-weight: 600; font-family: var(--mono); color: var(--ink-2); transition: color .35s; }
  .sup-card.active .sup-name { color: #59d39e; }
  .sup-card.redeploying .sup-name { color: var(--warn); }
  .sup-role { font-size: 10px; color: var(--ink-3); line-height: 1.4; }

  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
                  color: var(--ink-3); padding: 14px 18px 8px; }

  .assets { padding: 0 12px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .asset {
    background: var(--bg-3); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px; transition: all .35s ease;
  }
  .asset .a-name { font-size: 12px; font-weight: 600; }
  .asset .a-sub { font-size: 10px; color: var(--ink-3); font-family: var(--mono); margin-top: 2px; }
  .asset.risk {
    border-color: var(--fire); background: linear-gradient(180deg, rgba(255,90,44,.15), rgba(255,90,44,.05));
    box-shadow: 0 0 0 1px rgba(255,90,44,.3), 0 0 16px rgba(255,90,44,.15);
  }
  .asset.risk .a-name { color: var(--fire-2); }
  .asset.risk::before {
    content: "●"; color: var(--fire); margin-right: 5px; animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  .feed { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 12px; }
  .feed::-webkit-scrollbar { width: 6px; }
  .feed::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  /* LEFT INCIDENT FEED PANEL */
  #leftPanel {
    background: var(--bg-2); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0; overflow: hidden;
  }
  .left-head {
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    background: var(--bg-2);
  }
  .left-head h2 {
    margin: 0; font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--ink-3);
  }
  .left-head .clock {
    font-family: var(--mono); font-size: 22px; font-weight: 700;
    color: var(--fire-2); letter-spacing: 1px;
  }

  /* TIMELINE FOOTER */
  footer { background: var(--bg-2); border-top: 1px solid var(--line); display: flex; }

  /* Map-top incident banner */
  .map-banner {
    position: absolute; top: 12px; left: 12px; right: 220px; z-index: 10;
    padding: 20px 48px 20px 32px;
    background: rgba(11,16,21,.92); border: 1px solid var(--line); border-radius: 12px;
    backdrop-filter: blur(12px);
    display: flex; align-items: flex-start; gap: 24px;
  }
  .fb-meta { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; align-items: flex-start; padding-top: 4px; }
  .fb-time { font-family: var(--mono); font-size: 22px; color: var(--ink-3); letter-spacing: .5px; }
  .map-banner .ev-badge { font-size: 14px; padding: 4px 12px; letter-spacing: .8px; }
  .fb-content { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .fb-title { font-size: 42px; font-weight: 700; color: var(--ink); line-height: 1.1; }
  .fb-detail { font-size: 22px; color: var(--ink-2); line-height: 1.4; font-family: var(--mono); }

  /* Banner close / reopen */
  .banner-close {
    position: absolute; top: 12px; right: 14px;
    background: transparent; border: none; color: var(--ink-3);
    font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px;
  }
  .banner-close:hover { color: var(--ink); }
  .banner-reopen {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    display: none; align-items: center; gap: 8px;
    background: rgba(11,16,21,.88); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 16px; color: var(--ink-2); font-size: 13px; font-family: var(--mono);
    cursor: pointer; backdrop-filter: blur(8px);
  }
  .banner-reopen:hover { color: var(--ink); border-color: var(--cube); }

  /* Footer controls row (single row now banner is on map) */
  .footer-controls { display: flex; gap: 18px; align-items: center; padding: 14px 22px; flex: 1; min-height: 0; }
  .play-controls { display: flex; gap: 8px; align-items: center; }
  .play-controls button { width: 36px; height: 36px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .speed { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }

  .timeline { flex: 1; position: relative; height: 70px; }
  .timeline-track {
    position: absolute; left: 0; right: 0; top: 35px; height: 2px; background: var(--line); border-radius: 1px;
  }
  .timeline-progress {
    position: absolute; left: 0; top: 35px; height: 2px;
    background: linear-gradient(90deg, var(--cube), var(--fire)); border-radius: 1px;
  }
  .timeline-mark {
    position: absolute; top: 24px; width: 12px; height: 12px; border-radius: 50%; background: var(--bg-3);
    border: 2px solid var(--line); transform: translateX(-50%); cursor: pointer; transition: all .25s;
  }
  .timeline-mark.passed { background: var(--cube); border-color: var(--cube); box-shadow: 0 0 10px rgba(74,208,255,.5); }
  .timeline-mark.shift { width: 16px; height: 16px; top: 22px; }
  .timeline-mark.shift.passed { background: var(--fire); border-color: var(--fire); box-shadow: 0 0 14px rgba(255,90,44,.7); }
  .timeline-mark.current { transform: translateX(-50%) scale(1.4); }
  .timeline-label {
    position: absolute; top: 0; transform: translateX(-50%); font-family: var(--mono); font-size: 10px;
    color: var(--ink-3); white-space: nowrap; pointer-events: none;
  }
  .timeline-label.shift { color: var(--fire-2); font-weight: 600; }
  .timeline-mark:hover .timeline-label { color: var(--ink); }

  /* MAP ELEMENTS */
  .cube-g .cube-box { fill: var(--cube-dim); stroke: var(--cube); stroke-width: 1.5; }
  .cube-g.active .cube-box { fill: var(--cube); }
  .cube-g .cube-label { fill: var(--ink-2); font-family: var(--mono); font-size: 10px; }
  .cube-g.detecting .cube-box { fill: var(--fire); stroke: var(--fire-2); animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: .55; } }

  .wind-arrow { stroke: var(--wind); stroke-width: 1.5; fill: none; opacity: .9;
                marker-end: url(#windhead); transition: all 1.2s cubic-bezier(.45,.05,.2,1); transform-origin: center; transform-box: fill-box; }

  .asset-g .a-shape { fill: var(--bg-3); stroke: rgba(51,230,96,.55); stroke-width: 1.2; transition: all .4s; }
  .asset-g.risk .a-shape { fill: var(--fire-3); stroke: var(--fire); stroke-width: 2;
                          filter: drop-shadow(0 0 8px rgba(255,90,44,.7)); }
  .asset-g .a-label { fill: rgba(51,230,96,.7); font-family: var(--mono); font-size: 9px; }
  .asset-g.risk .a-label { fill: var(--fire-2); font-weight: 600; }
  .asset-line { stroke: rgba(51,230,96,.45); stroke-width: 2; fill: none; transition: stroke .4s; }
  .asset-line.risk { stroke: var(--fire); filter: drop-shadow(0 0 6px rgba(255,90,44,.6)); }
  .asset-g.risk .asset-line { stroke: var(--fire); filter: drop-shadow(0 0 6px rgba(255,90,44,.6)); }
  .asset-g .a-cross { stroke: rgba(51,230,96,.65); fill: none; stroke-linecap: round; pointer-events: none; transition: stroke .4s; }
  .asset-g.risk .a-cross { stroke: var(--fire-2); }

  .fire-dot {
    fill: var(--fire);
    filter: drop-shadow(0 0 12px var(--fire));
    animation: firePulse 1.6s infinite;
  }
  @keyframes firePulse { 0%,100% { r: 8; } 50% { r: 11; } }

  .spread-cone {
    fill: url(#coneGradient);
    stroke: var(--fire);
    stroke-width: 1;
    stroke-dasharray: 4 3;
    opacity: 0;
    transition: opacity .6s, transform 1.4s cubic-bezier(.55,.05,.2,1);
    transform-origin: var(--ox, 0) var(--oy, 0);
  }
  .spread-cone.show { opacity: 1; }

  .ridge { fill: none; stroke: #1b2937; stroke-width: 30; stroke-linecap: round; opacity: .55; }
  .river { fill: none; stroke: #0e2536; stroke-width: 4; stroke-linecap: round; opacity: .8; }

  .pop-card {
    position: absolute; pointer-events: none; padding: 8px 12px;
    background: rgba(11,16,21,.92); border: 1px solid var(--fire); border-radius: 8px;
    color: var(--ink); font-size: 12px; font-family: var(--mono);
    box-shadow: var(--shadow); opacity: 0; transform: translate(-50%, -120%);
    transition: opacity .35s; white-space: nowrap;
  }
  .pop-card.show { opacity: 1; }
  .pop-card .pop-title { color: var(--fire-2); font-weight: 600; margin-bottom: 2px; }

  .asset-g .a-shape, .asset-g .asset-line, .asset-g .a-label { cursor: pointer; }
  .asset.click { cursor: pointer; }
  .asset.click:hover { border-color: var(--cube); }

  /* Inspector modal-ish card (click-driven, persistent) */
  .inspector {
    position: absolute; pointer-events: auto;
    min-width: 280px; max-width: 340px; padding: 0;
    background: rgba(11,16,21,.96); border: 1px solid var(--line); border-radius: 10px;
    color: var(--ink); font-size: 12px; box-shadow: var(--shadow);
    opacity: 0; transform: translate(-50%, calc(-100% - 16px));
    transition: opacity .25s ease, transform .25s ease;
    z-index: 20; backdrop-filter: blur(8px);
  }
  .inspector.show { opacity: 1; }
  .inspector.risk { border-color: var(--fire); box-shadow: 0 0 0 1px rgba(255,90,44,.3), var(--shadow); }
  .inspector .ins-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--line);
  }
  .inspector .ins-name { font-weight: 600; font-size: 13px; }
  .inspector.risk .ins-name { color: var(--fire-2); }
  .inspector .ins-close {
    background: transparent; border: none; color: var(--ink-3); cursor: pointer;
    font-size: 16px; padding: 0 4px; line-height: 1;
  }
  .inspector .ins-close:hover { color: var(--ink); }
  .inspector .ins-body { padding: 12px 14px; }
  .inspector .ins-row { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; font-family: var(--mono); font-size: 11px; }
  .inspector .ins-row .k { color: var(--ink-3); }
  .inspector .ins-row .v { color: var(--ink); text-align: right; }
  .inspector .ins-row .v.risk { color: var(--fire-2); }
  .inspector .ins-row .v.ok   { color: var(--ok); }
  .inspector .ins-risk {
    margin-top: 10px; padding: 10px 12px;
    background: linear-gradient(180deg, rgba(255,90,44,.12), rgba(255,90,44,.02));
    border: 1px solid rgba(255,90,44,.4); border-radius: 6px;
  }
  .inspector .ins-risk .label { font-family: var(--mono); font-size: 10px; color: var(--fire-2); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
  .inspector .ins-risk .reason { font-size: 12px; line-height: 1.45; color: var(--ink); }
  .inspector .ins-risk .meta { font-family: var(--mono); font-size: 10px; color: var(--ink-3); margin-top: 6px; }
  .inspector .ins-safe {
    margin-top: 10px; padding: 8px 12px;
    background: rgba(89,211,158,.08); border: 1px solid rgba(89,211,158,.3); border-radius: 6px;
    font-size: 11px; color: var(--ok); font-family: var(--mono);
  }
  .inspector .ins-actions { margin-top: 10px; }
  .inspector .ins-actions .lbl { font-size: 10px; color: var(--ink-3); font-family: var(--mono); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
  .inspector .ins-actions .item {
    font-family: var(--mono); font-size: 11px; padding: 3px 0;
    color: var(--ink-2);
  }
  .inspector .ins-actions .item .tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    background: var(--bg-3); border: 1px solid var(--line); color: var(--cube); margin-right: 6px;
  }

  /* Highlight the active inspected asset */

  }
  .support-g.active .s-hlabel { fill: #59d39e; opacity: 1; }

/* ----- Build timeline marks ----- */
function buildTimeline() {
  const tl = $("#timeline");
  const minMin = 0, maxMin = STEPS[STEPS.length-1].tMin;
  STEPS.forEach((step, i) => {
    const pct = (step.tMin - minMin) / (maxMin - minMin) * 100;
    const mark = document.createElement("div");
    mark.className = "timeline-mark" + (step.isShift ? " shift" : "");
    mark.style.left = pct + "%";
    mark.title = step.tLabel + " · " + step.title;
    mark.addEventListener("click", () => gotoStep(i));
    const label = document.createElement("div");
    label.className = "timeline-label" + (step.isShift ? " shift" : "");
    label.textContent = step.isShift ? "WIND SHIFT" : step.tLabel;
    label.style.left = pct + "%";
    tl.appendChild(label);
    tl.appendChild(mark);
  });
}

function setProgress() {
  const maxMin = STEPS[STEPS.length-1].tMin;
  const pct = STEPS[currentStep].tMin / maxMin * 100;
  $("#timelineProgress").style.width = pct + "%";
  $$(".timeline-mark").forEach((m, i) => {
    m.classList.toggle("passed", i <= currentStep);
    m.classList.toggle("current", i === currentStep);
  });
}

/* ----- Wind arrows ----- */
function setWind(windMap) {
  $$("[data-wind]").forEach(line => {
    const cube = line.getAttribute("data-wind");
    const dirFrom = windMap && windMap[cube];
    // Wind direction is "from" - the arrow points TO where the wind goes
    // Compass bearing 240 means wind FROM 240°, so it blows toward 60°
    // In SVG (y down), heading bearing b means dx=sin(b°), dy=-cos(b°)
    const blowTo = (dirFrom == null) ? null : (dirFrom + 180) % 360;
    if (blowTo == null) {
      line.style.opacity = 0;
      return;
    }
    line.style.opacity = .9;
    // The line is drawn along +x at length 28. Rotate it so it points to bearing blowTo.
    // Bearing 0 = north (up). Rotation from +x axis: rotateAngle = blowTo - 90.
    const rot = blowTo - 90;
    line.setAttribute("transform", `rotate(${rot})`);
  });
}

/* ----- Spread cone ----- */
function setCone(cone) {
  const conePath = $("#conePath");
  const coneG = $("#cone");
  if (!cone) {
    conePath.classList.remove("show");
    return;
  }
  const halfRad = cone.halfAngle * Math.PI / 180;
  const r = cone.length;
  // Build wedge in LOCAL frame: tip at origin, opening along +x
  const x1 = Math.cos(halfRad) * r,  y1 = -Math.sin(halfRad) * r;
  const x2 = Math.cos(halfRad) * r,  y2 =  Math.sin(halfRad) * r;
  // Path with arc from (x1,y1) to (x2,y2)
  // Use arc with rx=ry=r
  const d = `M 0 0 L ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 0 1 ${x2.toFixed(1)} ${y2.toFixed(1)} Z`;
  conePath.setAttribute("d", d);
  // Position + rotate the group. Bearing -> rotation from +x axis = bearing - 90.
  const rot = cone.bearing - 90;
  coneG.setAttribute("transform", `translate(${FIRE_X} ${FIRE_Y}) rotate(${rot})`);
  // Slight delay so transition triggers
  requestAnimationFrame(() => conePath.classList.add("show"));
}

/* ----- Inspector (click-driven asset popup) ----- */
let currentInspected = null;

function findCurrentRisk(assetId) {
  // The currently-relevant zone is the one in the current step's risk list.
  const step = STEPS[currentStep];
  if (!step.risk.includes(assetId)) return null;
  const zoneId = step.cone && step.cone.label && step.cone.label.startsWith("RZ-001") ? "RZ-001" : "RZ-002";
  // Use whichever zone has this asset.
  for (const z of ["RZ-001","RZ-002"]) {
    if (RISK_DETAIL[z] && RISK_DETAIL[z][assetId] && step.risk.includes(assetId)) {
      return { zoneId: z, ...RISK_DETAIL[z][assetId] };
    }
  }
  return null;
}

function renderInspector(assetId) {
  const info = ASSET_INFO[assetId];
  if (!info) return;
  const insName = $("#insName");
  const insBody = $("#insBody");
  const ins = $("#inspector");
  const step = STEPS[currentStep];
  const risk = findCurrentRisk(assetId);

  ins.classList.toggle("risk", !!risk);
  insName.textContent = assetId;

  const propsRows = info.props.map(p =>
    `<div class="ins-row"><span class="k">${p[0]}</span><span class="v">${p[1]}</span></div>`
  ).join("");

  const headerRows = `
    <div class="ins-row"><span class="k">Name</span><span class="v">${info.name}</span></div>
    <div class="ins-row"><span class="k">Type</span><span class="v">${info.subtype}</span></div>
    <div class="ins-row"><span class="k">Operator</span><span class="v">${info.operator}</span></div>
    <div class="ins-row"><span class="k">Location</span><span class="v">${info.lat.toFixed(4)}, ${info.lng.toFixed(4)}</span></div>
  `;

  const riskBlock = risk ? `
    <div class="ins-risk">
      <div class="label">⚠ At risk · ${risk.zoneId} · score ${risk.score.toFixed(2)}</div>
      <div class="reason">${risk.reason}</div>
      <div class="meta">derived from spread estimate at T+${step.tMin.toString().padStart(2,"0")}:00 · fire FIRE-BEAR-001</div>
    </div>
  ` : `
    <div class="ins-safe">● Not currently in any active risk zone</div>
  `;

  const acts = ASSET_ACTIONS[assetId] || [];
  const actsBlock = acts.length ? `
    <div class="ins-actions">
      <div class="lbl">Actions targeting this asset</div>
      ${acts.map(a => `
        <div class="item"><span class="tag">${a.ex}</span>${a.action} <span style="color:var(--ink-3)">· ${a.channel}</span></div>
      `).join("")}
    </div>
  ` : "";

  const notes = info.notes ? `
    <div class="ins-actions">
      <div class="lbl">Notes</div>
      <div class="item" style="white-space:normal;color:var(--ink-2);line-height:1.5;">${info.notes}</div>
    </div>
  ` : "";

  insBody.innerHTML = headerRows + propsRows + riskBlock + actsBlock + notes;
}

function positionInspector(assetId) {
  const ins = $("#inspector");
  const map = $("#mapWrap");
  const mapRect = map.getBoundingClientRect();
  // Find the asset shape's bbox on screen
  const el = $(`#asset-${assetId} .a-shape`) || $(`#asset-${assetId}`);
  if (!el) return;
  const r = el.getBoundingClientRect();
  let x = r.left + r.width/2 - mapRect.left;
  let y = r.top  - mapRect.top;
  // Clamp inside map area (inspector min-width 280, so keep at least 150 from edges)
  const pad = 160;
  x = Math.max(pad, Math.min(mapRect.width - pad, x));
  const insH = ins.offsetHeight || 320;
  if (y < insH + 20) {
    // Flip below if inspector would clip the top
    ins.style.transform = "translate(-50%, 24px)";
    y = r.bottom - mapRect.top;
  } else {
    ins.style.transform = "translate(-50%, calc(-100% - 16px))";
  }
  ins.style.left = x + "px";
  ins.style.top  = y + "px";
}

function openInspector(assetId, opts = {}) {
  currentInspected = assetId;
  renderInspector(assetId);
  positionInspector(assetId);
  $("#inspector").classList.add("show");
  // Highlight selection
  $$(".asset-g").forEach(g => g.classList.toggle("inspected", g.getAttribute("data-asset") === assetId));
  $$(".asset").forEach(p => p.classList.toggle("inspected", p.id === "panel-" + assetId));
}

function closeInspector() {
  currentInspected = null;
  currentEWUnit = null;
  currentSupportUnit = null;
  const ins = $("#inspector");
  ins.classList.remove("show","ew-unit","support-asset","active","redeploying","standby");
  $$(".asset-g.inspected").forEach(g => g.classList.remove("inspected"));
  $$(".asset.inspected").forEach(p => p.classList.remove("inspected"));
  $$(".cube-g.inspected").forEach(g => g.classList.remove("inspected"));
  $$(".support-g.inspected").forEach(g => g.classList.remove("inspected"));
  $$(".sup-card.inspected").forEach(c => c.classList.remove("inspected"));
}

function wireAssetClicks() {
  ASSET_IDS.forEach(id => {
    const g = $(`#asset-${id}`);
    if (!g) return;
    g.style.cursor = "pointer";
    g.addEventListener("click", (e) => {
      e.stopPropagation();
      openInspector(id, { source: "map" });
    });
  });
}

      <td>active</td>
    </tr>
  ` : '<tr><td colspan="2" style="color:var(--ink-3)">No readings available</td></tr>';

  const detectBlock = data && data.detections.length ? `
    <div class="ins-actions">
      <div class="lbl">Active detections</div>
      ${data.detections.map(d => `<div class="ew-detection">▸ ${d}</div>`).join("")}
    </div>
  ` : '';

  const ifaceBlock = `
    <div class="ins-actions">
      <div class="lbl">Interfaces</div>
      <div style="margin-top:4px">
        ${info.interfaces.map(i => `<span class="ew-iface">${i}</span>`).join("")}
      </div>
    </div>
  `;

  $("#insBody").innerHTML = `
    <div class="ins-row"><span class="k">Unit</span><span class="v">${info.fullName}</span></div>
    <div class="ins-row"><span class="k">Location</span><span class="v">${info.lat.toFixed(3)}, ${info.lng.toFixed(3)} · ${info.elevation}</span></div>
    <div class="ins-row"><span class="k">Role</span><span class="v">${info.role}</span></div>
    <div class="ins-actions">
      <div class="lbl">Sensor readings · ${step.tLabel}</div>
      <table class="ew-sensor-table">${sensorRows}</table>
    </div>
    ${detectBlock}
    ${ifaceBlock}
  `;
}

function positionEWInspector(unitId) {
  const ins = $("#inspector");
  const map = $("#mapWrap");
  const mapRect = map.getBoundingClientRect();
  const el = $(`#cube-${unitId} .cube-box`) || $(`#cube-${unitId}`);
  if (!el) return;
  const r = el.getBoundingClientRect();
  let x = r.left + r.width / 2 - mapRect.left;
  let y = r.top - mapRect.top;
  const pad = 160;
  x = Math.max(pad, Math.min(mapRect.width - pad, x));
  const insH = ins.offsetHeight || 320;
  if (y < insH + 20) {
    ins.style.transform = "translate(-50%, 24px)";
    y = r.bottom - mapRect.top;
  } else {
    ins.style.transform = "translate(-50%, calc(-100% - 16px))";
  }
  ins.style.left = x + "px";
  ins.style.top  = y + "px";
}

function openEWInspector(unitId) {
  // Close any open asset inspector
  currentInspected = null;
  $$(".asset-g.inspected").forEach(g => g.classList.remove("inspected"));
  $$(".asset.inspected").forEach(p => p.classList.remove("inspected"));

  currentEWUnit = unitId;
  renderEWInspector(unitId);
  positionEWInspector(unitId);
  $("#inspector").classList.add("show");

  // Highlight the clicked cube
  $$(".cube-g").forEach(g => {
    g.classList.toggle("inspected", g.getAttribute("data-cube") === unitId);
  });
}

function closeEWInspector() {
  currentEWUnit = null;
  $("#inspector").classList.remove("show");
  $("#inspector").classList.remove("ew-unit");
  $$(".cube-g.inspected").forEach(g => g.classList.remove("inspected"));
}

function wireEWClicks() {
  $$(".cube-g").forEach(g => {
    const id = g.getAttribute("data-cube");
    if (!id) return;
    g.style.cursor = "pointer";
    g.addEventListener("click", (e) => {
      e.stopPropagation();
      if (currentEWUnit === id) { closeEWInspector(); return; }
      openEWInspector(id);
    });
  });
}

/* ----- Support asset inspector ----- */
function renderSupportInspector(unitId) {
  const info = SUPPORT_INFO[unitId];
  if (!info) return;
  const ins = $("#inspector");
  const stepStates = SUPPORT_STEPS[currentStep];
  const { state, role } = (stepStates && stepStates[unitId]) || { state:"standby", role:"" };

  ins.classList.remove("support-asset","active","redeploying","standby");
  ins.classList.add("support-asset", state);
  $("#insName").textContent = unitId;

  const stateLabel = state === "active" ? "ACTIVE" : state === "redeploying" ? "REDEPLOYING" : "STANDBY";
  const resourceRows = info.resources.map(r =>
    `<div class="ins-row"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`
  ).join("");

  $("#insBody").innerHTML = `
    <span class="sup-badge ${state}">${stateLabel}</span>
    <div class="ins-row"><span class="k">Name</span><span class="v">${info.fullName}</span></div>
    <div class="ins-row"><span class="k">Type</span><span class="v">${info.type}</span></div>
    <div class="ins-row"><span class="k">Status</span><span class="v">${role || "—"}</span></div>
    <div class="ins-row"><span class="k">Location</span><span class="v">${info.lat.toFixed(3)}, ${info.lng.toFixed(3)}</span></div>
    <div class="ins-actions">
      <div class="lbl">Resources</div>
      ${resourceRows}
    </div>
    <div class="ins-actions">
      <div class="lbl">Notes</div>
      <div class="item" style="white-space:normal;color:var(--ink-2);line-height:1.5;">${info.notes}</div>
    </div>
  `;
}

function positionSupportInspector(unitId) {
  const ins = $("#inspector");
  const map = $("#mapWrap");
  const mapRect = map.getBoundingClientRect();
  const el = $(`#sup-${unitId} .s-shape`) || $(`#sup-${unitId}`);
  if (!el) return;
  const r = el.getBoundingClientRect();
  let x = r.left + r.width / 2 - mapRect.left;
  let y = r.top - mapRect.top;
  const pad = 160;
  x = Math.max(pad, Math.min(mapRect.width - pad, x));
  const insH = ins.offsetHeight || 320;
  if (y < insH + 20) {
    ins.style.transform = "translate(-50%, 24px)";
    y = r.bottom - mapRect.top;
  } else {
    ins.style.transform = "translate(-50%, calc(-100% - 16px))";
  }
  ins.style.left = x + "px";
  ins.style.top  = y + "px";
}

function openSupportInspector(unitId, opts = {}) {
  // Clear any other open inspector first
  currentInspected = null;
  currentEWUnit = null;
  $$(".asset-g.inspected").forEach(g => g.classList.remove("inspected"));
  $$(".asset.inspected").forEach(p => p.classList.remove("inspected"));
  $$(".cube-g.inspected").forEach(g => g.classList.remove("inspected"));

  currentSupportUnit = unitId;
  renderSupportInspector(unitId);

  // Position from map marker (if clicked from map), else from panel card
  if (opts.source !== "panel") {
    positionSupportInspector(unitId);
  } else {
    // Anchor to the SVG marker if it exists, else centre of map
    const el = $(`#sup-${unitId} .s-shape`) || $(`#sup-${unitId}`);
    if (el) positionSupportInspector(unitId);
    else {
      const map = $("#mapWrap"); const mr = map.getBoundingClientRect();
      $("#inspector").style.left = (mr.width / 2) + "px";
      $("#inspector").style.top  = (mr.height / 2) + "px";
      $("#inspector").style.transform = "translate(-50%, -50%)";
    }
  }

  $("#inspector").classList.remove("ew-unit","risk");
  $("#inspector").classList.add("show");

  // Highlight SVG marker + panel card
  $$(".support-g").forEach(g => g.classList.toggle("inspected", g.getAttribute("data-sup") === unitId));
  $$(".sup-card").forEach(c => c.classList.toggle("inspected", c.id === "sup-card-" + unitId));
}

function wireSupportClicks() {
  $$(".support-g").forEach(g => {
    const id = g.getAttribute("data-sup");
    if (!id) return;
    g.style.cursor = "pointer";
    g.addEventListener("click", (e) => {
      e.stopPropagation();
      if (currentSupportUnit === id) { closeInspector(); return; }
      openSupportInspector(id, { source: "map" });
    });
  });
}

/* ----- Cube highlighting ----- */
function setFireDetect(cubes) {
  $$(".cube-g").forEach(g => {
    const id = g.getAttribute("data-cube");
    g.classList.toggle("detecting", cubes && cubes.includes(id));
  });
}

/* ----- Feed ----- */
function getEventBadge(step) {
  const t = step.title.toLowerCase();
  if (step.isShift)             return ['ev-wind',   'WIND SHIFT'];
  if (t.includes('ignition'))   return ['ev-fire',   'FIRE'];
  if (t.includes('smoke'))      return ['ev-smoke',  'SMOKE'];
  if (t.includes('spread') || t.includes('estimate')) return ['ev-spread','SPREAD'];
  if (t.includes('approved') || t.includes('supersedes')) return ['ev-rec','RECOM'];
  if (t.includes('approval') || t.includes('execution')) return ['ev-exec','EXEC'];
  if (t.includes('stabiliz'))   return ['ev-ok',     'STABLE'];
  if (t.includes('audit'))      return ['ev-audit',  'AUDIT'];
  return ['ev-info', 'INFO'];
}

function pushFeed(step) {
  const feed = $("#feed");
  const card = document.createElement("div");
  const [cls, label] = getEventBadge(step);
  card.className = "event-card" + (step.isShift ? " high" : "");
  card.innerHTML = `
    <div class="when">${step.tLabel}</div>
    <span class="ev-badge ${cls}">${label}</span>
    <div class="what">${step.title}</div>
    <div class="why">${step.detail}</div>
  `;
  feed.prepend(card);
}

function clearFeed() { $("#feed").innerHTML = ""; }

/* ----- Pop card ----- */
function popOn(step) {
  if (!step.pop) return;
  const pc = $("#popCard");
  $("#popTitle").textContent = step.pop.title;
  $("#popBody").textContent = step.pop.body;
  // Position near fire by default
  const wrap = $("#mapWrap");
  const rect = wrap.getBoundingClientRect();
  pc.style.left = (rect.width * 0.45) + "px";
  pc.style.top  = (rect.height * 0.30) + "px";
  pc.classList.add("show");
  clearTimeout(window._popT);
  window._popT = setTimeout(() => pc.classList.remove("show"), 3000);
}

/* ----- Step application ----- */
function applyStep(i) {
  const step = STEPS[i];

  // Update footer event banner
  const [bCls, bLabel] = getEventBadge(step);
  const fbTime  = $("#fbTime");
  const fbBadge = $("#fbBadge");
  const fbTitle = $("#fbTitle");
  if (fbTime)  fbTime.textContent = step.tLabel;
  if (fbBadge) { fbBadge.className = "ev-badge " + bCls; fbBadge.textContent = bLabel; }
  if (fbTitle) fbTitle.textContent = step.title;
  const fbDetail = $("#fbDetail");
  if (fbDetail) fbDetail.textContent = step.detail || '';
  // Keep reopen pill in sync
  const rb = $("#bannerReopenBadge"); const rt = $("#bannerReopenTitle");
  if (rb) { rb.className = "ev-badge " + bCls; rb.textContent = bLabel; }
  if (rt) rt.textContent = step.title;

  $("#clock").textContent = step.tLabel;
  setWind(step.wind);
  setCone(step.cone);
  setRisk(step.risk);
  setFireDetect(step.fireDetect);
  popOn(step);
  setProgress();
  setSupport(currentStep);
  // Re-render the inspector with the new step's risk context, if open
  if (currentInspected) {
    renderInspector(currentInspected);
    positionInspector(currentInspected);
  }
  if (currentEWUnit) {
    renderEWInspector(currentEWUnit);
    positionEWInspector(currentEWUnit);
  }
  if (currentSupportUnit) {
    renderSupportInspector(currentSupportUnit);
  }
}

function gotoStep(i) {
  if (i < 0 || i >= STEPS.length) return;
  // Rebuild feed up to step i for clean state when jumping
  clearFeed();
  for (let j = 0; j <= i; j++) pushFeed(STEPS[j]);
  currentStep = i;
  applyStep(i);
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    pushFeed(STEPS[currentStep]);
    applyStep(currentStep);
  } else {
    pause();
  }
}

function prevStep() {
  if (currentStep > 0) gotoStep(currentStep - 1);
}

function play() {
  playing = true;
  $("#playPause").textContent = "❚❚";
  scheduleNext();
}
function pause() {
  playing = false;
  $("#playPause").textContent = "▶";
  clearTimeout(playTimer);
}
function scheduleNext() {
  clearTimeout(playTimer);
  if (!playing) return;
  // Time between steps proportional to scenario gap, capped/floored.
  const cur = STEPS[currentStep].tMin;
  const nxt = (currentStep < STEPS.length - 1) ? STEPS[currentStep+1].tMin : cur;
  const gap = Math.max(2, nxt - cur);   // minutes
  const baseMs = 1400 + Math.min(2200, gap * 90);
  const ms = baseMs / speed;
  playTimer = setTimeout(() => {
    nextStep();
    if (playing && currentStep < STEPS.length - 1) scheduleNext();
    else pause();
  }, ms);
}

/* ----- Speed toggle ----- */
function cycleSpeed() {
  const idx = SPEEDS.indexOf(speed);
  speed = SPEEDS[(idx + 1) % SPEEDS.length];
  $("#speedLabel").textContent = speed + "×";
  if (playing) scheduleNext();
}

/* ----- Wiring ----- */
$("#playPause").addEventListener("click", () => playing ? pause() : play());
$("#nextStep").addEventListener("click", () => { pause(); nextStep(); });
$("#prevStep").addEventListener("click", () => { pause(); prevStep(); });
$("#speedToggle").addEventListener("click", cycleSpeed);
$("#restart").addEventListener("click", () => { pause(); gotoStep(0); });
$("#jumpBefore").addEventListener("click", () => { pause(); gotoStep(3); });   // T+12: REC-001 approved (pre-shift)
$("#jumpAfter").addEventListener("click",  () => { pause(); gotoStep(7); });   // T+35: post-shift executions

/* ----- Banner close / reopen ----- */
$("#bannerClose").addEventListener("click", () => {
  $("#mapBanner").style.display = "none";
  const reopen = $("#bannerReopen");
  reopen.style.display = "flex";
});
$("#bannerReopen").addEventListener("click", () => {
  $("#mapBanner").style.display = "flex";
  $("#bannerReopen").style.display = "none";
});

/* ----- Background toggle ----- */
$("#bgToggle").addEventListener("change", (e) => {
  $("#mapWrap").classList.toggle("no-bg", !e.target.checked);
});

/* ----- Inspector wiring ----- */
$("#insClose").addEventListener("click", closeInspector);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeInspector(); });
$("#mapWrap").addEventListener("click", (e) => {
  // Click on empty map area closes the inspector
  if (e.target.closest("#inspector")) return;
  if (e.target.closest(".asset-g")) return;
  if (e.target.closest(".cube-g")) return;
  if (e.target.closest(".support-g")) return;
  closeInspector();
});

/* ----- Init ----- */
buildTimeline();
buildSupport();
buildAssets();
wireAssetClicks();
wireEWClicks();
wireSupportClicks();
gotoStep(0);

</script>
</body>
</html>
